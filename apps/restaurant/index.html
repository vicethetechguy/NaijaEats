<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naija Eats Restaurant - Merchant Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tomato: '#ff4d4d',
                        ink: '#1a1a1a',
                        cream: '#fffdf5',
                        mustard: '#facc15',
                        sage: '#84cc16'
                    },
                    boxShadow: {
                        'stk': '8px 8px 0px 0px #1a1a1a',
                        'stk-sm': '4px 4px 0px 0px #1a1a1a',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fffdf5; color: #1a1a1a; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.closed { transform: translateX(-100%); }
        .neo-card { background: white; border: 3px solid #1a1a1a; border-radius: 24px; box-shadow: 6px 6px 0px 0px #1a1a1a; transition: all 0.2s ease; }
        .view-content { display: none; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toggle-checkbox:checked + .toggle-label { background-color: #84cc16; }
        .sold-out { opacity: 0.6; filter: grayscale(0.5); }
        .status-badge { font-size: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 8px; border-radius: 999px; border: 1.5px solid #1a1a1a; }
    </style>
</head>
<body class="min-h-screen">
    <input type="file" id="item-image-upload" class="hidden" accept="image/*" onchange="handleItemImageChange(event)">
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed inset-y-0 left-0 w-72 bg-cream border-r-[3px] border-ink z-50 p-6 flex flex-col closed">
        <div class="flex justify-between items-center mb-12">
            <div class="text-2xl tracking-tighter text-tomato">
                <span class="font-light">Naija</span><span class="font-black">Eats</span>
                <span class="block text-[10px] font-black text-ink uppercase tracking-widest -mt-1">Merchant Portal</span>
            </div>
            <button onclick="toggleSidebar()" class="p-2 border-2 border-ink rounded-xl bg-white shadow-stk-sm"><i data-lucide="x" size="20"></i></button>
        </div>
        <nav class="flex-1 space-y-3">
            <button onclick="showView('ops')" class="nav-link w-full flex items-center gap-4 p-4 hover:bg-mustard border-2 border-ink rounded-2xl transition-all font-black text-sm uppercase tracking-wide" data-view="ops"><i data-lucide="layers" size="20"></i> Operations</button>
            <button onclick="showView('orders')" class="nav-link w-full flex items-center gap-4 p-4 bg-mustard border-2 border-ink rounded-2xl shadow-stk-sm font-black text-sm uppercase tracking-wide transition-all" data-view="orders"><i data-lucide="clipboard-list" size="20"></i> Live Orders</button>
            <button onclick="showView('inventory')" class="nav-link w-full flex items-center gap-4 p-4 hover:bg-mustard border-2 border-transparent hover:border-ink rounded-2xl transition-all font-bold text-sm uppercase tracking-wide" data-view="inventory"><i data-lucide="package" size="20"></i> Inventory</button>
            <button onclick="showView('analytics')" class="nav-link w-full flex items-center gap-4 p-4 hover:bg-mustard border-2 border-transparent hover:border-ink rounded-2xl transition-all font-bold text-sm uppercase tracking-wide" data-view="analytics"><i data-lucide="bar-chart-3" size="20"></i> Analytics</button>
            <button onclick="showView('profile')" class="nav-link w-full flex items-center gap-4 p-4 hover:bg-mustard border-2 border-transparent hover:border-ink rounded-2xl transition-all font-bold text-sm uppercase tracking-wide" data-view="profile"><i data-lucide="store" size="20"></i> Profile</button>
        </nav>

        <div class="mt-auto pt-6 border-t-2 border-dashed border-ink/20">
            <button onclick="window.location.href='/'" class="w-full flex items-center gap-4 p-4 text-tomato font-black text-sm uppercase tracking-wide">
                <i data-lucide="log-out" size="20"></i> Log Out
            </button>
        </div>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-ink/40 backdrop-blur-sm z-40 hidden"></div>

    <header class="p-6 flex justify-between items-center sticky top-0 bg-cream/80 backdrop-blur-md z-30 border-b-2 border-ink/5">
        <button onclick="toggleSidebar()" class="p-3 bg-white border-[3px] border-ink rounded-2xl shadow-stk-sm"><i data-lucide="menu" size="24"></i></button>
        <button onclick="showView('profile')" class="flex items-center gap-3">
            <div class="text-right"><p class="text-[10px] font-black text-ink/40 uppercase tracking-widest">Branch A</p><p class="text-sm font-black tracking-tight business-name-header">Royal Kitchen</p></div>
            <div class="size-12 bg-white border-[3px] border-ink rounded-2xl shadow-stk-sm overflow-hidden"><img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=200&auto=format&fit=crop" id="header-logo" class="w-full h-full object-cover"></div>
        </button>
    </header>

    <main class="p-6 pb-12 max-w-3xl mx-auto w-full">
        <!-- VIEW: OPERATIONS -->
        <div id="view-ops" class="view-content space-y-8">
            <header><h1 class="text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Live Ops</h1><p class="text-ink/60 font-bold uppercase text-xs tracking-widest" id="ops-count">12 Active Orders</p></header>
            <div class="grid grid-cols-3 gap-3">
                <div class="neo-card p-4 bg-tomato text-white text-center"><p class="text-2xl font-black" id="count-new">0</p><p class="text-[8px] font-black uppercase tracking-widest">New</p></div>
                <div class="neo-card p-4 bg-mustard text-ink text-center"><p class="text-2xl font-black" id="count-prep">0</p><p class="text-[8px] font-black uppercase tracking-widest">Prep</p></div>
                <div class="neo-card p-4 bg-sage text-white text-center"><p class="text-2xl font-black" id="count-ready">0</p><p class="text-[8px] font-black uppercase tracking-widest">Ready</p></div>
            </div>
            <button onclick="showView('orders')" class="w-full py-4 bg-ink text-white border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-stk">View All Orders</button>
        </div>

        <!-- VIEW: LIVE ORDERS -->
        <div id="view-orders" class="view-content active space-y-8">
            <header>
                <h1 class="text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Order Tickets</h1>
                <p class="text-ink/60 font-bold uppercase text-xs tracking-widest">Tap an order to start preparing</p>
            </header>
            <div class="space-y-4" id="orders-list">
                <!-- Orders injected here -->
            </div>
        </div>

        <!-- VIEW: INVENTORY -->
        <div id="view-inventory" class="view-content space-y-8">
            <header class="flex justify-between items-end"><div><h1 class="text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Inventory</h1><p class="text-ink/60 font-bold uppercase text-xs tracking-widest">Menu Management</p></div><button onclick="addFoodItem()" class="p-3 bg-mustard border-[3px] border-ink rounded-2xl shadow-stk-sm transition-transform"><i data-lucide="plus" size="20"></i></button></header>
            <div class="space-y-4" id="inventory-list"></div>
            <button onclick="saveInventory()" id="save-inv-btn" class="w-full py-4 bg-ink text-white border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-stk transition-all flex items-center justify-center gap-2"><span id="save-inv-text">Save Inventory</span></button>
        </div>

        <!-- VIEW: ANALYTICS -->
        <div id="view-analytics" class="view-content space-y-8">
            <header><h1 class="text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Analytics</h1></header>
            <div class="neo-card p-6 space-y-6">
                <p class="text-xs font-black uppercase tracking-widest text-ink/40">Total Sales</p>
                <p class="text-4xl font-black tracking-tighter">₦428,000</p>
                <div class="h-32 w-full flex items-end gap-2"><div class="flex-1 bg-ink/10 rounded-t-lg h-24"></div><div class="flex-1 bg-tomato rounded-t-lg h-32"></div></div>
            </div>
        </div>

        <!-- VIEW: PROFILE -->
        <div id="view-profile" class="view-content space-y-8">
            <header><h1 class="text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Business Profile</h1></header>
            <div class="neo-card p-6 text-center space-y-6">
                <div class="relative inline-block group">
                    <div class="size-32 rounded-[32px] border-[4px] border-ink shadow-stk mx-auto overflow-hidden"><img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=200&auto=format&fit=crop" id="logo-img-preview" class="w-full h-full object-cover"></div>
                    <input type="file" id="logo-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                    <button onclick="document.getElementById('logo-upload').click()" class="absolute -bottom-2 -right-2 p-2 bg-tomato text-white border-2 border-ink rounded-full shadow-stk-sm"><i data-lucide="camera" size="16"></i></button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="business-name-input" class="text-2xl font-black tracking-tight bg-cream border-2 border-ink rounded-2xl px-4 py-3 w-full shadow-stk-sm" value="Royal Kitchen Ent.">
                    <textarea id="business-bio-input" rows="4" class="w-full bg-transparent font-medium text-sm text-ink/70 resize-none outline-none" placeholder="Describe your restaurant...">Serving the finest gourmet meals since 2018.</textarea>
                </div>
            </div>
            <button onclick="saveProfile()" id="save-btn" class="w-full py-4 bg-ink text-white border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-stk transition-all">Save Profile</button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Default Orders if none in localstorage
        const defaultOrders = [
            { id: '8841', user: 'Jane S.', items: ['Royal Margherita Pizza', 'Extra Cheese'], status: 'new', time: '12:40 PM', total: 15500 },
            { id: '8842', user: 'Amara K.', items: ['Signature Jollof Rice'], status: 'new', time: '12:45 PM', total: 6500 },
            { id: '8843', user: 'Tunde O.', items: ['Seafood Gumbo', 'Pounded Yam'], status: 'prep', time: '12:30 PM', total: 24500 }
        ];

        let orders = JSON.parse(localStorage.getItem('naija_eats_orders')) || defaultOrders;

        window.onload = () => {
            renderOrders();
            renderOpsStats();
            
            // Profile & Inventory loading (existing logic)
            const savedProfile = localStorage.getItem('restaurant_profile');
            if (savedProfile) {
                const data = JSON.parse(savedProfile);
                document.getElementById('business-name-input').value = data.name;
                document.getElementById('business-bio-input').value = data.bio;
                document.getElementById('logo-img-preview').src = data.logo;
                document.getElementById('header-logo').src = data.logo;
                document.querySelector('.business-name-header').innerText = data.name;
            }
            const savedInv = localStorage.getItem('restaurant_inventory');
            if (savedInv) inventoryItems = JSON.parse(savedInv);
            renderInventory();
        };

        function renderOrders() {
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `neo-card p-5 space-y-4 cursor-pointer active:scale-95 transition-transform ${order.status === 'ready' ? 'opacity-60 grayscale' : ''}`;
                
                let statusColor = 'bg-ink/10 text-ink';
                let actionBtn = '';
                
                if (order.status === 'new') {
                    statusColor = 'bg-tomato/20 text-tomato';
                    actionBtn = `<button onclick="updateOrderStatus(event, '${order.id}', 'prep')" class="w-full py-3 bg-tomato text-white border-[3px] border-ink rounded-xl font-black uppercase text-xs shadow-stk-sm">Open & Start Prep</button>`;
                } else if (order.status === 'prep') {
                    statusColor = 'bg-mustard text-ink';
                    actionBtn = `<button onclick="updateOrderStatus(event, '${order.id}', 'ready')" class="w-full py-3 bg-sage text-white border-[3px] border-ink rounded-xl font-black uppercase text-xs shadow-stk-sm">Mark as Ready</button>`;
                } else {
                    statusColor = 'bg-sage/20 text-sage';
                    actionBtn = `<div class="text-center py-2 text-[10px] font-black text-sage uppercase tracking-widest">Rider Notified</div>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-ink/40 uppercase tracking-widest mb-1">Order #${order.id}</p>
                            <h3 class="text-xl font-black tracking-tight">${order.user}</h3>
                        </div>
                        <span class="status-badge ${statusColor}">${order.status}</span>
                    </div>
                    <div class="space-y-1">
                        ${order.items.map(item => `<p class="text-sm font-bold text-ink/70 flex items-center gap-2"><i data-lucide="dot" size="16"></i> ${item}</p>`).join('')}
                    </div>
                    <div class="flex justify-between items-center pt-2 border-t border-dashed border-ink/10">
                        <p class="text-xs font-black">₦${order.total.toLocaleString()}</p>
                        <p class="text-[10px] font-bold text-ink/40">${order.time}</p>
                    </div>
                    ${actionBtn}
                `;
                
                if (order.status === 'new') {
                    card.onclick = (e) => updateOrderStatus(e, order.id, 'prep');
                }

                list.appendChild(card);
            });
            lucide.createIcons();
            renderOpsStats();
        }

        function updateOrderStatus(e, id, newStatus) {
            if (e) e.stopPropagation();
            const idx = orders.findIndex(o => o.id === id);
            if (idx !== -1) {
                orders[idx].status = newStatus;
                localStorage.setItem('naija_eats_orders', JSON.stringify(orders));
                
                // If marked as ready, we could technically trigger a "Broadcast" for delivery app
                if (newStatus === 'ready') {
                    notifyDeliveryApp(orders[idx]);
                }
                
                renderOrders();
            }
        }

        function notifyDeliveryApp(order) {
            // Mocking a broadcast by adding to a "Delivery Queue" in localStorage
            const deliveryQueue = JSON.parse(localStorage.getItem('naija_eats_delivery_queue')) || [];
            deliveryQueue.push({
                ...order,
                pickupLocation: 'Royal Kitchen, Branch A',
                type: 'Pickup'
            });
            localStorage.setItem('naija_eats_delivery_queue', JSON.stringify(deliveryQueue));
            console.log("Delivery app notified for order:", order.id);
        }

        function renderOpsStats() {
            const counts = { new: 0, prep: 0, ready: 0 };
            orders.forEach(o => counts[o.status]++);
            
            document.getElementById('count-new').innerText = counts.new;
            document.getElementById('count-prep').innerText = counts.prep;
            document.getElementById('count-ready').innerText = counts.ready;
            document.getElementById('ops-count').innerText = `${counts.new + counts.prep} Active Orders`;
        }

        // Shared Inventory logic from previous edits
        let inventoryItems = [
            { id: 1, name: "Royal Margherita Pizza", price: 12500, available: true, image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=200&auto=format&fit=crop" },
            { id: 2, name: "Seafood Gumbo", price: 18000, available: false, image: "https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?q=80&w=200&auto=format&fit=crop" }
        ];

        function addFoodItem() {
            const newItem = { id: Date.now(), name: "New Food Item", price: 0, available: true, image: "https://images.unsplash.com/photo-1493770348161-369560ae357d?q=80&w=200&auto=format&fit=crop" };
            inventoryItems.unshift(newItem);
            renderInventory();
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            if(!list) return;
            list.innerHTML = '';
            inventoryItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `neo-card p-5 space-y-4 ${!item.available ? 'sold-out' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${item.image}" class="size-20 rounded-xl border-2 border-ink object-cover">
                        <div class="flex-1">
                            <input type="text" class="text-lg font-black tracking-tight bg-transparent w-full border-b border-ink/10 outline-none" value="${item.name}">
                            <div class="flex items-center gap-2"><span class="text-xs font-black text-ink/40">₦</span><input type="number" class="text-sm font-black bg-transparent w-32 border-b border-ink/10 outline-none" value="${item.price}"></div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); document.getElementById('overlay').classList.toggle('hidden'); }
        function showView(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.dataset.view === viewId) { link.classList.add('bg-mustard', 'shadow-stk-sm'); }
                else { link.classList.remove('bg-mustard', 'shadow-stk-sm'); }
            });
            if (!document.getElementById('sidebar').classList.contains('closed')) toggleSidebar();
            window.scrollTo(0, 0);
        }

        function saveProfile() {
            const data = { name: document.getElementById('business-name-input').value, bio: document.getElementById('business-bio-input').value, logo: document.getElementById('logo-img-preview').src };
            localStorage.setItem('restaurant_profile', JSON.stringify(data));
            document.getElementById('header-logo').src = data.logo;
            document.querySelector('.business-name-header').innerText = data.name;
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (e) => { document.getElementById('logo-img-preview').src = e.target.result; }; reader.readAsDataURL(file); }
        }
    </script>
</body>
</html>
