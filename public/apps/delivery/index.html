<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=19gaJsJHKStb_0MvwcmSCaCdt6EUeb-K5&sz=w128" />
    <title>Naija Eats Delivery - Rider Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gfhcctinvgdiirddcftc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmaGNjdGludmdkaWlyZGRjZnRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzI1ODgsImV4cCI6MjA5MzE0ODU4OH0.4tQLIo9lAfZW0ygrcQe6eLdj3aD80Dr47FZPBU3g_RU';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tomato: '#ff4d4d',
                        ink: '#1a1a1a',
                        cream: '#fffdf5',
                        mustard: '#facc15',
                        sage: '#84cc16'
                    },
                    boxShadow: {
                        'stk': '8px 8px 0px 0px #1a1a1a',
                        'stk-sm': '4px 4px 0px 0px #1a1a1a',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fffdf5; color: #1a1a1a; }
        
        
        .neo-card { background: white; border: 3px solid #1a1a1a; border-radius: 24px; box-shadow: 6px 6px 0px 0px #1a1a1a; transition: all 0.2s ease; }
        .view-content { display: none; }
        .view-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">
    <!-- Desktop Header & Bottom Dock -->
    <header class="sticky top-4 z-50 mx-auto max-w-7xl px-4 mb-8">
      <div class="bg-white border-[3px] border-ink rounded-full px-3 sm:px-6 py-2.5 flex items-center justify-between shadow-stk">
        <div class="flex items-center gap-2 sm:gap-8">
          <button onclick="window.location.href='/'" class="flex items-center gap-2 text-xl sm:text-2xl tracking-tighter text-tomato pl-2">
            <img src="https://drive.google.com/thumbnail?id=19gaJsJHKStb_0MvwcmSCaCdt6EUeb-K5&sz=w200" alt="Logo" class="h-8 w-auto object-contain"/>
            <div class="flex items-center"><span class="font-light">Naija</span><span class="font-black">Eats</span></div>
            <span class="hidden lg:block text-[10px] font-black text-ink uppercase tracking-widest ml-2 -mt-1">Delivery App</span>
          </button>
          <nav class="hidden lg:flex items-center gap-6">
            <button onclick="showView('map')" class="desktop-nav-link text-tomato hover:text-tomato transition-colors font-bold tracking-wide text-sm" data-view="map">Active Map</button>
            <button onclick="showView('history')" class="desktop-nav-link text-ink hover:text-tomato transition-colors font-bold tracking-wide text-sm" data-view="history">Deliveries</button>
            <button onclick="showView('pay')" class="desktop-nav-link text-ink hover:text-tomato transition-colors font-bold tracking-wide text-sm" data-view="pay">My Pay</button>
            <button onclick="showView('profile')" class="desktop-nav-link text-ink hover:text-tomato transition-colors font-bold tracking-wide text-sm" data-view="profile">Profile</button>
            <button onclick="showView('settings')" class="desktop-nav-link text-ink hover:text-tomato transition-colors font-bold tracking-wide text-sm" data-view="settings">Settings</button>
          </nav>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
          <button onclick="window.location.href='/'" class="p-2 rounded-full border-2 border-ink bg-cream hover:bg-mustard transition-colors shadow-stk-sm"><i data-lucide="log-out" size="16"></i></button>
          <button onclick="showView('profile')" class="size-10 rounded-full border-2 border-ink bg-mustard overflow-hidden hover:scale-105 transition-transform flex items-center justify-center shadow-stk-sm" id="header-avatar-container">
            <i data-lucide="user" size="20" class="text-ink/60"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile Bottom Dock -->
    <div class="lg:hidden fixed bottom-3 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-1.5rem)] max-w-md">
      <div class="bg-white border-[3px] border-ink rounded-2xl px-2 py-2 shadow-stk flex items-center justify-center gap-1 overflow-x-auto">
        <button onclick="showView('map')" class="mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 bg-mustard text-ink border-ink px-3" data-view="map">
          <i data-lucide="navigation" size="18" stroke-width="2.5"></i><span class="nav-text text-xs font-extrabold tracking-wide whitespace-nowrap" style="">Active Map</span>
        </button>
        <button onclick="showView('history')" class="mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 text-ink border-transparent hover:bg-mustard/30 w-11" data-view="history">
          <i data-lucide="history" size="18" stroke-width="2.5"></i><span class="nav-text text-xs font-extrabold tracking-wide whitespace-nowrap" style="display:none">Deliveries</span>
        </button>
        <button onclick="showView('pay')" class="mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 text-ink border-transparent hover:bg-mustard/30 w-11" data-view="pay">
          <i data-lucide="wallet" size="18" stroke-width="2.5"></i><span class="nav-text text-xs font-extrabold tracking-wide whitespace-nowrap" style="display:none">My Pay</span>
        </button>
        <button onclick="showView('profile')" class="mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 text-ink border-transparent hover:bg-mustard/30 w-11" data-view="profile">
          <i data-lucide="user-circle" size="18" stroke-width="2.5"></i><span class="nav-text text-xs font-extrabold tracking-wide whitespace-nowrap" style="display:none">Profile</span>
        </button>
        <button onclick="showView('settings')" class="mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 text-ink border-transparent hover:bg-mustard/30 w-11" data-view="settings">
          <i data-lucide="settings" size="18" stroke-width="2.5"></i><span class="nav-text text-xs font-extrabold tracking-wide whitespace-nowrap" style="display:none">Settings</span>
        </button>
      </div>
    </div>

    <main class="p-4 sm:p-6 pb-28 lg:pb-12 max-w-lg mx-auto w-full">
        <!-- VIEW: MAP -->
        <div id="view-map" class="view-content active space-y-8">
            <section class="neo-card h-80 overflow-hidden relative">
                <div class="w-full h-full bg-cream bg-[radial-gradient(#1a1a1a_1px,transparent_1px)] bg-[size:20px_20px] opacity-60"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="size-10 bg-tomato border-[3px] border-ink rounded-full shadow-stk-sm flex items-center justify-center animate-bounce">
                        <i data-lucide="bike" class="text-white" size="18"></i>
                    </div>
                </div>
            </section>

            <div id="offers-container" class="space-y-4">
                <div class="text-center py-8">
                    <p class="text-ink/40 font-bold uppercase text-xs tracking-widest">Searching for nearby orders...</p>
                </div>
            </div>
        </div>

        <!-- VIEW: HISTORY -->
        <div id="view-history" class="view-content space-y-8">
            <header>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Deliveries</h1>
                <p class="text-ink/60 font-bold uppercase text-xs tracking-widest" id="history-count">0 Completed Today</p>
            </header>
            <div class="space-y-4" id="history-list">
                <div class="neo-card p-4 text-center border-dashed border-ink/20 opacity-40">
                    <p class="text-xs font-black uppercase tracking-widest">No Deliveries Yet</p>
                </div>
            </div>
        </div>

        <!-- VIEW: PAY -->
        <div id="view-pay" class="view-content space-y-8">
            <header>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tighter leading-none mb-2 uppercase">My Pay</h1>
                <p class="text-ink/60 font-bold uppercase text-xs tracking-widest">Earnings this week</p>
            </header>
            <div class="neo-card p-6 bg-tomato text-white text-center">
                <p class="text-xs font-black uppercase tracking-widest opacity-60 mb-2">Available Balance</p>
                <h2 class="text-4xl sm:text-5xl font-black tracking-tighter mb-6" id="balance-total">₦0</h2>
                <button onclick="alert('Cash out request sent!')" class="w-full py-4 bg-white text-tomato border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-xl">Cash Out Now</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="neo-card p-5 bg-mustard/20">
                    <p class="text-[10px] font-black text-ink/40 uppercase tracking-widest">Base Pay</p>
                    <p class="text-2xl font-black tracking-tighter" id="base-pay">₦0</p>
                </div>
                <div class="neo-card p-5 bg-sage/20">
                    <p class="text-[10px] font-black text-ink/40 uppercase tracking-widest">Tips</p>
                    <p class="text-2xl font-black tracking-tighter" id="tips-val">₦0</p>
                </div>
            </div>
        </div>

        <!-- VIEW: PROFILE -->
        <div id="view-profile" class="view-content space-y-8">
            <header>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Rider Profile</h1>
                <p class="text-ink/60 font-bold uppercase text-xs tracking-widest">Manage your identity</p>
            </header>

            <div class="neo-card p-6 text-center space-y-6">
                <div class="relative inline-block">
                    <div class="size-32 rounded-[32px] border-[4px] border-ink shadow-stk mx-auto overflow-hidden">
                        <div id="profile-img-preview-container" class="w-full h-full bg-cream flex items-center justify-center">
                            <i data-lucide="user" size="40" class="text-ink/40"></i>
                        </div>
                    </div>
                    <input type="file" id="profile-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                    <button onclick="document.getElementById('profile-upload').click()" class="absolute -bottom-2 -right-2 p-2 bg-tomato text-white border-2 border-ink rounded-full shadow-stk-sm">
                        <i data-lucide="camera" size="16"></i>
                    </button>
                </div>

                <div class="space-y-4">
                    <div class="text-left space-y-1">
                        <label class="text-[10px] font-black uppercase text-ink/40 ml-1">Rider Name</label>
                        <input type="text" id="rider-name-input" class="w-full bg-cream border-2 border-ink rounded-2xl px-4 py-3 font-black text-lg shadow-stk-sm outline-none focus:bg-white" value="">
                    </div>
                    <div class="text-left space-y-1">
                        <label class="text-[10px] font-black uppercase text-ink/40 ml-1">Vehicle Type</label>
                        <select id="vehicle-input" class="w-full bg-cream border-2 border-ink rounded-2xl px-4 py-3 font-black text-lg shadow-stk-sm outline-none appearance-none">
                            <option value="Motorbike">Motorbike</option>
                            <option value="Bicycle">Bicycle</option>
                            <option value="Car">Car</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="saveProfile()" id="save-profile-btn" class="w-full py-4 bg-ink text-white border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-stk active:scale-95 transition-all">Save Profile</button>
        </div>

        <!-- VIEW: SETTINGS -->
        <div id="view-settings" class="view-content space-y-8">
            <header>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tighter leading-none mb-2 uppercase">Settings</h1>
                <p class="text-ink/60 font-bold uppercase text-xs tracking-widest">App Preferences</p>
            </header>
            <div class="neo-card divide-y-2 divide-ink/5">
                <div class="p-5 flex justify-between items-center">
                    <div><p class="font-black text-sm uppercase">Push Notifications</p><p class="text-[10px] font-bold text-ink/40">Enabled</p></div>
                    <div class="size-6 bg-sage border-2 border-ink rounded-md flex items-center justify-center text-white"><i data-lucide="check" size="14"></i></div>
                </div>
                <div class="p-5 flex justify-between items-center">
                    <div><p class="font-black text-sm uppercase">Automatic Map Zoom</p><p class="text-[10px] font-bold text-ink/40">Standard</p></div>
                    <div class="size-6 bg-cream border-2 border-ink rounded-md"></div>
                </div>
            </div>
            <button onclick="alert('Account deletion requested!')" class="w-full py-4 bg-white border-[3px] border-ink rounded-2xl font-black uppercase text-sm shadow-stk-sm text-tomato">Delete Account</button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        let deliveryHistory = [];
        
        window.onload = async () => {
            loadProfile();
            await fetchHistory();
            subscribeToOffers();
            renderHistory();
            updateStats();
        };

        async function fetchHistory() {
            const { data } = await supabase
                .from('orders')
                .select('*, profiles(full_name)')
                .eq('status', 'delivered')
                .order('updated_at', { ascending: false });
            
            if (data) {
                deliveryHistory = data.map(h => ({
                    id: h.id.slice(0,4),
                    user: h.profiles?.full_name || 'Customer',
                    pay: h.delivery_fee || 2500,
                    time: new Date(h.updated_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                }));
            }
        }

        function subscribeToOffers() {
            supabase
                .channel('delivery-offers')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: 'status=eq.ready' }, () => {
                    checkQueue();
                })
                .subscribe();
            
            checkQueue(); // Initial check
        }

        async function loadProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                if (profile) {
                    document.getElementById('rider-name-input').value = profile.full_name;
                    if (profile.avatar_url) {
                        const previewContainer = document.getElementById('profile-img-preview-container');
                        if (previewContainer) previewContainer.innerHTML = `<img src="${profile.avatar_url}" id="profile-img-preview" class="w-full h-full object-cover">`;
                        const headerAvatarContainer = document.getElementById('header-avatar-container');
                        if (headerAvatarContainer) headerAvatarContainer.innerHTML = `<img src="${profile.avatar_url}" id="header-avatar" class="w-full h-full object-cover">`;
                    }
                    const nameHeader = document.querySelector('.rider-name-header');
                    if (nameHeader) nameHeader.innerText = profile.full_name;
                }
            }
        }

        async function saveProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const name = document.getElementById('rider-name-input').value;
            let logo = "";
            const logoImg = document.getElementById('profile-img-preview');
            if (logoImg) logo = logoImg.src;

            const { error } = await supabase
                .from('profiles')
                .update({ full_name: name, avatar_url: logo })
                .eq('id', user.id);
            
            const btn = document.getElementById('save-profile-btn');
            if (!error) {
                btn.innerText = "Cloud Synced!";
                btn.classList.add('bg-sage');
                const nameHeader = document.querySelector('.rider-name-header');
                if (nameHeader) nameHeader.innerText = name;
                const headerAvatarContainer = document.getElementById('header-avatar-container');
                if (headerAvatarContainer && logo) headerAvatarContainer.innerHTML = `<img src="${logo}" id="header-avatar" class="w-full h-full object-cover">`;
            }
            
            setTimeout(() => {
                btn.innerText = "Save Profile";
                btn.classList.remove('bg-sage');
            }, 2000);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewContainer = document.getElementById('profile-img-preview-container');
                    if (previewContainer) previewContainer.innerHTML = `<img src="${e.target.result}" id="profile-img-preview" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        }

        async function checkQueue() {
            const { data, error } = await supabase
                .from('orders')
                .select('*, profiles(full_name)')
                .eq('status', 'ready');
            
            const container = document.getElementById('offers-container');
            if(!container) return;
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="text-center py-8"><p class="text-ink/40 font-bold uppercase text-xs tracking-widest">Searching for nearby orders...</p></div>`;
                return;
            }

            container.innerHTML = '';
            data.forEach((order) => {
                const payAmount = order.delivery_fee || 2500;
                const card = document.createElement('div');
                card.className = "bg-mustard border-[4px] border-ink rounded-[32px] p-6 shadow-stk relative overflow-hidden active:scale-95 transition-transform";
                card.innerHTML = `
                    <div class="relative z-10">
                        <span class="bg-ink text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded-full mb-3 inline-block">Flash Offer</span>
                        <h2 class="text-2xl sm:text-3xl font-black tracking-tighter leading-none mb-1">+₦${payAmount.toLocaleString()}</h2>
                        <p class="text-sm font-bold opacity-80 mb-2">From: Local Merchant</p>
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-6">Drop: ${order.profiles?.full_name || 'Customer'}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button onclick="ignoreOffer('${order.id}')" class="py-4 bg-white border-[3px] border-ink rounded-2xl font-black uppercase text-xs shadow-stk-sm">Ignore</button>
                            <button onclick="acceptOffer('${order.id}')" class="py-4 bg-ink text-white border-[3px] border-ink rounded-2xl font-black uppercase text-xs shadow-stk-sm">Accept</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function ignoreOffer(id) {
            // In a real app, we might hide this specific offer for this rider
            checkQueue();
        }

        async function acceptOffer(id) {
            const { error } = await supabase
                .from('orders')
                .update({ status: 'out_for_delivery' })
                .eq('id', id);

            if (!error) {
                alert(`Order Accepted! Status updated to 'Out for Delivery'.`);
                fetchHistory();
                checkQueue();
            }
        }

        function updateStats() {
            const total = deliveryHistory.reduce((acc, h) => acc + h.pay, 0);
            const balanceEl = document.getElementById('balance-total');
            const basePayEl = document.getElementById('base-pay');
            if(balanceEl) balanceEl.innerText = `₦${total.toLocaleString()}`;
            if(basePayEl) basePayEl.innerText = `₦${total.toLocaleString()}`;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if(!list) return;
            if (deliveryHistory.length === 0) {
                list.innerHTML = '<div class="neo-card p-4 text-center border-dashed border-ink/20 opacity-40"><p class="text-xs font-black uppercase tracking-widest">No Deliveries Yet</p></div>';
                return;
            }
            list.innerHTML = '';
            document.getElementById('history-count').innerText = `${deliveryHistory.length} Completed Today`;
            
            deliveryHistory.forEach(h => {
                const item = document.createElement('div');
                item.className = "neo-card p-5 flex justify-between items-center";
                item.innerHTML = `
                    <div>
                        <p class="text-lg font-black tracking-tight">Order #${h.id}</p>
                        <p class="text-[10px] font-bold text-ink/60 uppercase">${h.time} • ${h.user}</p>
                    </div>
                    <span class="text-lg font-black text-sage">+₦${h.pay.toLocaleString()}</span>
                `;
                list.appendChild(item);
            });
        }

        
        function showView(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.desktop-nav-link').forEach(link => {
                if (link.dataset.view === viewId) { link.classList.add('text-tomato'); link.classList.remove('text-ink'); }
                else { link.classList.remove('text-tomato'); link.classList.add('text-ink'); }
            });

            document.querySelectorAll('.mobile-nav-link').forEach(link => {
                const textSpan = link.querySelector('.nav-text');
                if (link.dataset.view === viewId) {
                    link.className = 'mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 bg-mustard text-ink border-ink px-3';
                    if (textSpan) textSpan.style.display = 'inline';
                } else {
                    link.className = 'mobile-nav-link flex items-center justify-center gap-1.5 h-11 rounded-xl transition-all duration-300 ease-out border-2 shrink-0 text-ink border-transparent hover:bg-mustard/30 w-11';
                    if (textSpan) textSpan.style.display = 'none';
                }
            });
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
